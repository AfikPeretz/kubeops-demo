apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kubeops-demo
  labels:
    app: backend
spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: kubeops-backend:1.0.0

          # Important for local kind images.
          # Kubernetes should use the image already loaded into the cluster.
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          # Kubernetes uses this to know if the container is still alive.
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

          # Kubernetes uses this to know if the container is ready to receive traffic.
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"