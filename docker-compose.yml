services:
  backend:
    build:
      context: ./backend
    container_name: kubeops-backend
    environment:
      APP_NAME: kubeops-backend
      APP_VERSION: 1.0.0
      APP_ENV: local-docker
      DEMO_API_KEY: local-demo-key

      # Future database variables.
      DB_HOST: ""
      DB_PORT: "3306"
      DB_NAME: ""
      DB_USER: ""
      DB_PASSWORD: ""
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: kubeops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend